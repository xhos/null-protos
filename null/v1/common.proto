syntax = "proto3";

package null.v1;

import "google/protobuf/timestamp.proto";

// Money represents a monetary amount.
//
// JSON encoding: {"amount": 6.50, "currency_code": "USD"}
//
// Note: amount is stored as a double (decimal dollars/units), NOT cents.
// This avoids the int64-as-string encoding of google.type.Money.
// For $6.50 use amount=6.50, not amount=650.
message Money {
  double amount = 1;
  string currency_code = 2; // ISO 4217, e.g. "USD", "CAD", "EUR"
}

message Location {
  double latitude = 1; // WGS84 decimal degrees
  double longitude = 2; // WGS84 decimal degrees
  string source = 3; // e.g. "gps", "ip", "manual"
  optional string label = 4; // human-readable place name
}

message Cursor {
  google.protobuf.Timestamp date = 1;
  optional int64 id = 2;
}

message TimeOfDay {
  int32 hours = 1; // 0-23
  int32 minutes = 2; // 0-59
}
