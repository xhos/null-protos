syntax = "proto3";

package null.v1;

import "null/v1/category.proto";
import "google/type/money.proto";
import "google/type/date.proto";

message TrendPoint {
  google.type.Date date = 1; // YYYY-MM-DD
  google.type.Moneyincome = 2;
  google.type.Moneyexpenses = 3;
}

message MonthlyComparison {
  string month = 1; // YYYY-MM
  google.type.Moneyincome = 2;
  google.type.Moneyexpenses = 3;
  google.type.Moneynet = 4;
}

message DashboardSummary {
  int64 total_accounts = 1;
  int64 total_transactions = 2;
  google.type.Moneytotal_income = 3;
  google.type.Moneytotal_expenses = 4;
  int64 transactions_last_30_days = 5;
  int64 uncategorized_transactions = 6;
}

message TopCategory {
  string slug = 1;
  string label = 2;
  string color = 3;
  int64 transaction_count = 4;
  google.type.Moneytotal_amount = 5;
}

message TopMerchant {
  string merchant = 1;
  int64 transaction_count = 2;
  google.type.Moneytotal_amount = 3;
  google.type.Moneyavg_amount = 4;
}

message PeriodInfo {
  google.type.Date start_date = 1;
  google.type.Date end_date = 2;
  string label = 3;
}

message PeriodSpending {
  google.type.Moneyamount = 1;
  int64 transaction_count = 2;
}

message CategorySpendingComparison {
  optional int64 category_id = 1;
  PeriodSpending current_period = 2;
  PeriodSpending previous_period = 3;
}

message CategorySpendingTotals {
  google.type.Moneycurrent_period_total = 1;
  google.type.Moneyprevious_period_total = 2;
}

message NetWorthPoint {
  google.type.Date date = 1;
  google.type.Moneynet_worth = 2;
}
